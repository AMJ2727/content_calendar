<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap');

:root {
  --cream: #FAF7F2;
  --blush: #F2E8E1;
  --rose: #D4957A;
  --deep-rose: #A85C42;
  --mauve: #C9A89A;
  --sage: #8FAF9F;
  --deep-sage: #4A7A6A;
  --lavender: #C8BDD9;
  --deep-lav: #7A6A9A;
  --gold: #C9A227;
  --dark: #2A1F1A;
  --mid: #6B5248;
  --light-text: #9E8880;
  --white: #FFFFFF;
  --shadow: rgba(42,31,26,0.12);
  --radius: 14px;
  --radius-sm: 8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  color: var(--dark);
  min-height: 100vh;
}

/* ── HEADER ── */
.header {
  background: var(--dark);
  padding: 18px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-title {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  color: var(--cream);
  letter-spacing: 0.5px;
}
.header-sub {
  font-size: 11px;
  color: var(--mauve);
  margin-top: 2px;
}
.view-tabs {
  display: flex;
  gap: 4px;
  background: rgba(255,255,255,0.08);
  border-radius: 99px;
  padding: 4px;
}
.view-tab {
  padding: 6px 14px;
  border-radius: 99px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: none;
  background: none;
  color: var(--mauve);
  transition: all 0.2s;
}
.view-tab.active {
  background: var(--rose);
  color: white;
}

/* ── MAIN ── */
.main { padding: 20px 16px; max-width: 900px; margin: 0 auto; }

/* ── WEEK NAV ── */
.week-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.week-label {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  color: var(--dark);
}
.nav-btn {
  background: white;
  border: 1px solid var(--blush);
  border-radius: var(--radius-sm);
  padding: 8px 14px;
  cursor: pointer;
  font-size: 14px;
  color: var(--mid);
  transition: all 0.15s;
}
.nav-btn:hover { background: var(--blush); }
.today-btn {
  background: var(--rose);
  color: white;
  border: none;
  border-radius: var(--radius-sm);
  padding: 8px 14px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
}

/* ── WEEK GRID ── */
.week-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 8px;
  margin-bottom: 20px;
}

.day-col {
  background: white;
  border-radius: var(--radius);
  overflow: hidden;
  border: 1.5px solid var(--blush);
  min-height: 180px;
  transition: border-color 0.15s;
}
.day-col.today { border-color: var(--rose); }
.day-col.friday { background: #FDF9F5; }

.day-header {
  padding: 10px 10px 8px;
  border-bottom: 1px solid var(--blush);
  text-align: center;
}
.day-name {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--light-text);
}
.day-num {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  color: var(--dark);
  line-height: 1.1;
}
.day-col.today .day-num { color: var(--rose); }
.day-col.friday .day-name { color: var(--rose); }

.day-body {
  padding: 6px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  min-height: 120px;
}

/* ── CONTENT CHIPS ── */
.chip {
  border-radius: 8px;
  padding: 5px 7px;
  font-size: 10px;
  font-weight: 500;
  cursor: pointer;
  border: none;
  text-align: left;
  line-height: 1.3;
  transition: transform 0.1s, opacity 0.1s;
  position: relative;
}
.chip:active { transform: scale(0.96); }
.chip.film { background: #EDF6F2; color: var(--deep-sage); border-left: 3px solid var(--sage); }
.chip.edit { background: #EEF0FA; color: var(--deep-lav); border-left: 3px solid var(--lavender); }
.chip.publish { background: #FDF0EA; color: var(--deep-rose); border-left: 3px solid var(--rose); }
.chip.deadline { background: #FFF3E0; color: #8B4513; border-left: 3px solid var(--gold); }
.chip-stage { font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.7; }
.chip-name { display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
.chip-platform { font-size: 8px; opacity: 0.6; }

.add-btn {
  background: none;
  border: 1.5px dashed var(--blush);
  border-radius: 8px;
  padding: 6px;
  font-size: 18px;
  color: var(--mauve);
  cursor: pointer;
  width: 100%;
  transition: all 0.15s;
  margin-top: auto;
}
.add-btn:hover { border-color: var(--rose); color: var(--rose); background: var(--blush); }

.filming-window {
  font-size: 9px;
  color: var(--light-text);
  text-align: center;
  padding: 3px 4px;
  background: var(--blush);
  border-radius: 4px;
  margin: 2px 0;
}

/* ── BACKLOG PANEL ── */
.backlog-panel {
  background: white;
  border-radius: var(--radius);
  border: 1.5px solid var(--blush);
  overflow: hidden;
}
.backlog-header {
  padding: 14px 16px;
  border-bottom: 1px solid var(--blush);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.backlog-title {
  font-family: 'Playfair Display', serif;
  font-size: 16px;
}
.backlog-count {
  background: var(--rose);
  color: white;
  border-radius: 99px;
  padding: 2px 10px;
  font-size: 12px;
  font-weight: 600;
}
.backlog-filters {
  display: flex;
  gap: 6px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--blush);
  flex-wrap: wrap;
}
.filter-pill {
  padding: 5px 12px;
  border-radius: 99px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  border: 1.5px solid var(--blush);
  background: white;
  color: var(--mid);
  transition: all 0.15s;
}
.filter-pill.active { background: var(--dark); color: white; border-color: var(--dark); }
.filter-pill.high { border-color: var(--gold); color: var(--gold); }
.filter-pill.high.active { background: var(--gold); color: white; }

.backlog-list {
  max-height: 320px;
  overflow-y: auto;
}
.backlog-item {
  padding: 10px 16px;
  border-bottom: 1px solid var(--blush);
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: grab;
  transition: background 0.15s;
}
.backlog-item:hover { background: var(--cream); }
.backlog-item:last-child { border-bottom: none; }
.backlog-item.priority-high { border-left: 3px solid var(--gold); }
.backlog-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.dot-film { background: var(--sage); }
.dot-campaign { background: var(--gold); }
.dot-purchase { background: var(--lavender); }
.backlog-info { flex: 1; min-width: 0; }
.backlog-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.backlog-meta { font-size: 11px; color: var(--light-text); margin-top: 1px; }
.backlog-badges { display: flex; gap: 4px; flex-shrink: 0; }
.badge {
  font-size: 9px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 99px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.badge-deadline { background: #FFF3E0; color: #8B4513; }
.badge-high { background: #FEF9E7; color: var(--gold); }
.badge-campaign { background: #EDF6F2; color: var(--deep-sage); }
.badge-platform { background: var(--blush); color: var(--mid); }
.badge-cheers { background: #FDE8E8; color: #C0392B; }

.schedule-btn {
  background: var(--rose);
  color: white;
  border: none;
  border-radius: var(--radius-sm);
  padding: 6px 12px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  flex-shrink: 0;
  transition: background 0.15s;
}
.schedule-btn:hover { background: var(--deep-rose); }

/* ── MODAL ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(42,31,26,0.5);
  z-index: 200;
  display: none;
  align-items: flex-end;
  justify-content: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: white;
  border-radius: 20px 20px 0 0;
  width: 100%;
  max-width: 600px;
  max-height: 85vh;
  overflow-y: auto;
  padding: 20px;
}
.modal-title {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  margin-bottom: 16px;
  color: var(--dark);
}
.modal-field { margin-bottom: 14px; }
.modal-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--light-text); margin-bottom: 5px; display: block; }

.month-view { display: none; }

/* ── MONTH GRID ── */

var currentMonth = new Date(TODAY.getFullYear(), TODAY.getMonth(), 1);

// ── HELPERS ──
function getWeekStart(d) {
  var day = new Date(d);
  var dow = day.getDay();
  var diff = dow === 0 ? -6 : 1 - dow;
  day.setDate(day.getDate() + diff);
  day.setHours(0,0,0,0);
  return day;
}
function addDays(d, n) {
  var r = new Date(d);
  r.setDate(r.getDate() + n);
  return r;
}
function fmtDate(d) {
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
}
function fmtDateLong(d) {
  return d.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
}
function isSameDay(a, b) {
  return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
}
function dateToStr(d) {
  return d.toISOString().split('T')[0];
}
function strToDate(s) {
  if(!s) return null;
  var parts = s.split('-');
  return new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
}
function isFriday(d) { return d.getDay() === 5; }
function isWeekend(d) { return d.getDay() === 0 || d.getDay() === 6; }

function getFilmingRules(d) {
  if(isFriday(d)) return { canFilm: true, cheersOk: false, window: '11am – 12pm (short day, no cheers)' };
  if(isWeekend(d)) return { canFilm: false, cheersOk: false, window: null };
  return { canFilm: true, cheersOk: true, window: '11am – 5pm (cheers after 1pm, start by 4pm)' };
}

// ── STATS ──
function updateStats() {
  var toFilm = BACKLOG.filter(function(i){ return i.stage === 'to_film' || i.stage === 'to_order'; }).length;
  var scheduled = Object.keys(SCHEDULE).length;
  var deadlines = BACKLOG.filter(function(i){ return i.deadline; }).length;
  var published = PUBLISHED.length;
  document.getElementById('stat-backlog').textContent = toFilm;
  document.getElementById('stat-scheduled').textContent = scheduled;
  document.getElementById('stat-deadlines').textContent = deadlines;
  document.getElementById('stat-published').textContent = published;
  document.getElementById('backlog-count').textContent = BACKLOG.length;
}

// ── VIEW SWITCHING ──
function setView(v) {
  currentView = v;
  document.querySelectorAll('.view-tab').forEach(function(t){ t.classList.remove('active'); });
  document.querySelectorAll('.view-tab').forEach(function(t){ if(t.textContent.toLowerCase()===v) t.classList.add('active'); });
  document.getElementById('week-view').classList.toggle('active', v==='week');
  document.getElementById('day-view').classList.toggle('active', v==='day');
  document.getElementById('month-view').classList.toggle('active', v==='month');
  updateStats();
  renderBacklog();
  if(v==='week') renderWeek();
  if(v==='day') renderDay();
  if(v==='month') renderMonth();
}

function goToToday() {
  currentWeekStart = getWeekStart(TODAY);
  currentDay = new Date(TODAY);
  currentMonth = new Date(TODAY.getFullYear(), TODAY.getMonth(), 1);
  if(currentView==='week') renderWeek();
  if(currentView==='day') renderDay();
  if(currentView==='month') renderMonth();
}

// ── WEEK VIEW ──
function shiftWeek(n) {
  currentWeekStart = addDays(currentWeekStart, n*7);
  renderWeek();
}

function renderWeek() {
  var days = [];
  for(var i=0; i<7; i++) days.push(addDays(currentWeekStart, i));
  var end = days[6];
  document.getElementById('week-label').textContent =
    fmtDate(currentWeekStart) + ' – ' + fmtDate(end) + ', ' + end.getFullYear();

  var html = '';
  days.forEach(function(d) {
    var isToday = isSameDay(d, TODAY);
    var fri = isFriday(d);
    var weekend = isWeekend(d);
    var rules = getFilmingRules(d);
    var ds = dateToStr(d);
    var dayName = d.toLocaleDateString('en-US',{weekday:'short'}).toUpperCase();
    var dayNum = d.getDate();

    // Check if blocked
    var isBlocked = !!BLOCKED_DAYS[ds];
    var blockedLabel = BLOCKED_DAYS[ds] || '';

    // Get scheduled items for this day
    var filmItems = BACKLOG.filter(function(item){ return SCHEDULE[item.id] && SCHEDULE[item.id].filmDate === ds; });
    var editItems = BACKLOG.filter(function(item){ return SCHEDULE[item.id] && SCHEDULE[item.id].editDate === ds; });
    var pubItems = BACKLOG.filter(function(item){ return SCHEDULE[item.id] && SCHEDULE[item.id].pubDate === ds; });
    // Deadline items
    var deadlineItems = BACKLOG.filter(function(item){ return item.deadline === ds; });

    html += '<div class="day-col'+(isToday?' today':'')+(fri?' friday':'')+(isBlocked?' blocked':'')+'">';
    html += '<div class="day-header"><div class="day-name">'+dayName+'</div><div class="day-num">'+dayNum+'</div></div>';
    html += '<div class="day-body">';

    if(isBlocked) {
      html += '<div class="blocked-label">'+blockedLabel+'</div>';
      html += '<button class="block-btn" onclick="openBlockModal(\''+ds+'\')">✏️ Edit</button>';
    } else {
      if(rules.window && !weekend) {
        html += '<div class="filming-window">'+( fri ? '🌸 Short day' : (rules.cheersOk ? '🥂 Cheers OK' : '')) +'</div>';
      }
      if(weekend) {
        html += '<div class="filming-window">Weekend</div>';
      }

      deadlineItems.forEach(function(item){
        html += '<div class="chip deadline" onclick="openChipModal(\''+item.id+'\')">';
        html += '<div class="chip-stage">📅 DEADLINE</div>';
        html += '<div class="chip-name">'+item.brand+'</div>';
        html += '</div>';
      });

      filmItems.forEach(function(item){
        html += '<div class="chip film" onclick="openChipModal(\''+item.id+'\')">';
        html += '<div class="chip-stage">🎬 FILM</div>';
        html += '<span class="chip-name">'+item.brand+'</span>';
        html += '</div>';
      });
      editItems.forEach(function(item){
        html += '<div class="chip edit" onclick="openChipModal(\''+item.id+'\')">';
        html += '<div class="chip-stage">✂️ EDIT</div>';
        html += '<span class="chip-name">'+item.brand+'</span>';
        html += '</div>';
      });
      pubItems.forEach(function(item){
        html += '<div class="chip publish" onclick="openChipModal(\''+item.id+'\')">';
        html += '<div class="chip-stage">🚀 PUBLISH</div>';
        html += '<span class="chip-name">'+item.brand+'</span>';
        html += '</div>';
      });

      if(!weekend) {
        html += '<button class="add-btn" onclick="openScheduleModalForDay(\''+ds+'\')">+</button>';
        html += '<button class="block-btn" onclick="openBlockModal(\''+ds+'\')" style="font-size:11px;color:#CCC;padding:3px;">🚫 block day</button>';
      }
    }
    html += '</div></div>';
  });
  document.getElementById('week-grid').innerHTML = html;
}

// ── DAY VIEW ──
function shiftDay(n) { currentDay = addDays(currentDay, n); renderDay(); }
function renderDay() {
  var d = currentDay;
  var ds = dateToStr(d);
  document.getElementById('day-label').textContent = fmtDateLong(d);
  var rules = getFilmingRules(d);
  var filmItems = BACKLOG.filter(function(item){ return SCHEDULE[item.id] && SCHEDULE[item.id].filmDate === ds; });
  var editItems = BACKLOG.filter(function(item){ return SCHEDULE[item.id] && SCHEDULE[item.id].editDate === ds; });
  var pubItems = BACKLOG.filter(function(item){ return SCHEDULE[item.id] && SCHEDULE[item.id].pubDate === ds; });
  var deadlineItems = BACKLOG.filter(function(item){ return item.deadline === ds; });

  var html = '';
  if(rules.window) {
    html += '<div class="filming-rule">📅 Filming window: <strong>'+rules.window+'</strong>'+(rules.cheersOk ? ' 🥂' : '')+' </div>';
  }

  var allItems = [];
  deadlineItems.forEach(function(i){ allItems.push({item:i, type:'deadline', time:'All day'}); });
  filmItems.forEach(function(i){ allItems.push({item:i, type:'film', time:'11:00 AM'}); });
  editItems.forEach(function(i){ allItems.push({item:i, type:'edit', time:'Flex'}); });
  pubItems.forEach(function(i){ allItems.push({item:i, type:'publish', time:'Morning'}); });

  if(allItems.length === 0) {
    html += '<div class="empty-day" style="background:white;border-radius:14px;border:1.5px solid var(--blush);">Nothing scheduled for this day.<br><br><button onclick="openScheduleModalForDay(\''+ds+'\')" style="background:var(--rose);color:white;border:none;border-radius:8px;padding:10px 20px;cursor:pointer;font-size:13px;font-weight:600;">+ Schedule Something</button></div>';
  } else {
    html += '<div class="timeline">';
    allItems.forEach(function(entry){
      var stageClass = entry.type === 'film' ? 'stage-film' : (entry.type === 'edit' ? 'stage-edit' : (entry.type === 'publish' ? 'stage-publish' : ''));
      var stageLabel = entry.type === 'film' ? '🎬 Film' : (entry.type === 'edit' ? '✂️ Edit' : (entry.type === 'publish' ? '🚀 Publish' : '📅 Deadline'));
      html += '<div class="timeline-item" onclick="openChipModal(\''+entry.item.id+'\')">';
      html += '<div class="timeline-time">'+entry.time+'</div>';
      html += '<div class="timeline-content">';
      html += '<div class="timeline-title">'+entry.item.name+'</div>';
      html += '<div class="timeline-sub">'+entry.item.brand+' • '+entry.item.platform+'</div>';
      html += '<span class="timeline-stage '+stageClass+'">'+stageLabel+'</span>';
      if(SCHEDULE[entry.item.id] && SCHEDULE[entry.item.id].notes) {
        html += '<div style="font-size:12px;color:var(--light-text);margin-top:4px;">'+SCHEDULE[entry.item.id].notes+'</div>';
      }
      html += '</div></div>';
    });
    html += '</div>';
    html += '<button onclick="openScheduleModalForDay(\''+ds+'\')" style="width:100%;padding:12px;background:var(--blush);border:none;border-radius:var(--radius-sm);color:var(--mid);font-size:13px;font-weight:600;cursor:pointer;">+ Add more</button>';
  }
  document.getElementById('day-content').innerHTML = html;
}

// ── MONTH VIEW ──
function shiftMonth(n) {
  currentMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth()+n, 1);
  renderMonth();
}
function renderMonth() {
  document.getElementById('month-label').textContent =
    currentMonth.toLocaleDateString('en-US',{month:'long',year:'numeric'});
  var days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  var html = '<div class="month-grid">';
  days.forEach(function(d){ html += '<div class="month-day-header">'+d+'</div>'; });

  var firstDay = new Date(currentMonth);
  var dow = firstDay.getDay();
  var offset = dow === 0 ? 6 : dow - 1;
  var startDate = addDays(firstDay, -offset);

  for(var i=0; i<42; i++) {
    var d = addDays(startDate, i);
    var ds = dateToStr(d);
    var isToday = isSameDay(d, TODAY);
    var otherMonth = d.getMonth() !== currentMonth.getMonth();
    var filmItems = BACKLOG.filter(function(item){ return SCHEDULE[item.id] && SCHEDULE[item.id].filmDate === ds; });
    var editItems = BACKLOG.filter(function(item){ return SCHEDULE[item.id] && SCHEDULE[item.id].editDate === ds; });
    var pubItems = BACKLOG.filter(function(item){ return SCHEDULE[item.id] && SCHEDULE[item.id].pubDate === ds; });
    var hasDeadline = BACKLOG.some(function(item){ return item.deadline === ds; });

    html += '<div class="month-day'+(isToday?' today':'')+(otherMonth?' other-month':'')+'" onclick="clickMonthDay(\''+ds+'\')">';
    html += '<div class="month-day-num">'+d.getDate()+'</div>';
    if(isDayBlocked) html += '<div style="font-size:8px;color:#AAA;font-weight:600;">'+BLOCKED_DAYS[ds].split(' ')[0]+'</div>';
    if(hasDeadline) html += '<span class="month-dot" style="background:var(--gold)"></span>';
    filmItems.forEach(function(){ html += '<span class="month-dot" style="background:var(--sage)"></span>'; });
    editItems.forEach(function(){ html += '<span class="month-dot" style="background:var(--lavender)"></span>'; });
    pubItems.forEach(function(){ html += '<span class="month-dot" style="background:var(--rose)"></span>'; });
    html += '</div>';
  }
  html += '</div>';
  html += '<div style="display:flex;gap:12px;font-size:11px;color:var(--light-text);padding:8px 0;">';
  html += '<span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--gold);margin-right:4px"></span>Deadline</span>';
  html += '<span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--sage);margin-right:4px"></span>Film</span>';
  html += '<span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--lavender);margin-right:4px"></span>Edit</span>';
  html += '<span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--rose);margin-right:4px"></span>Publish</span>';
  html += '</div>';
  document.getElementById('month-grid-container').innerHTML = html;
}

function clickMonthDay(ds) {
  currentDay = strToDate(ds);
  setView('day');
}

// ── BACKLOG ──
function filterBacklog(filter, btn) {
  activeFilter = filter;
  document.querySelectorAll('.filter-pill').forEach(function(p){ p.classList.remove('active'); });
  btn.classList.add('active');
  renderBacklog();
}

function renderBacklog() {
  var items = BACKLOG.filter(function(item){
    if(activeFilter === 'all') return true;
    if(activeFilter === 'high') return item.priority === 'high';
    if(activeFilter === 'deadline') return !!item.deadline;
    return item.source === activeFilter || item.category === activeFilter;
  });

  var html = '';
  if(items.length === 0) {
    html = '<div class="empty-day">No items match this filter.</div>';
  }
  items.forEach(function(item){
    var dotClass = item.source === 'Campaign' ? 'dot-campaign' : (item.source === 'Purchase' ? 'dot-purchase' : 'dot-film');
    var isHighPri = item.priority === 'high';
    html += '<div class="backlog-item'+(isHighPri?' priority-high':'')+'">';
    html += '<div class="backlog-dot '+dotClass+'"></div>';
    html += '<div class="backlog-info">';
    html += '<div class="backlog-name">'+item.name+'</div>';
    html += '<div class="backlog-meta">'+item.brand+' • '+item.category+(item.angle ? ' • '+item.angle.substring(0,50)+(item.angle.length>50?'...':'') : '')+'</div>';
    html += '</div>';
    html += '<div class="backlog-badges">';
    if(item.deadline) html += '<span class="badge badge-deadline">Due '+item.deadline.split('-').slice(1).join('/')+'</span>';
    if(isHighPri) html += '<span class="badge badge-high">⚡ Priority</span>';
    if(item.platform) html += '<span class="badge badge-platform">'+item.platform+'</span>';
    if(item.source === 'Campaign' || item.source === 'YS Sponsored') html += '<span class="badge badge-campaign">'+item.source+'</span>';
    html += '</div>';
    html += '<button class="schedule-btn" onclick="openScheduleModal(\''+item.id+'\')">Schedule</button>';
    html += '</div>';
  });
  document.getElementById('backlog-list').innerHTML = html;
}

// ── SCHEDULE MODAL ──
function openScheduleModal(itemId) {
  schedulingItemId = itemId;
  var item = BACKLOG.find(function(i){ return i.id === itemId; });
  if(!item) return;

  document.getElementById('modal-title').textContent = 'Schedule: '+item.name;
  var detail = document.getElementById('modal-item-detail');
  detail.style.display = 'block';
  detail.innerHTML = '<div class="modal-detail-label">Brand / Category</div><div class="modal-detail-val">'+item.brand+' • '+item.category+'</div>';
  if(item.angle) detail.innerHTML += '<div class="modal-detail-label" style="margin-top:8px">Angle</div><div class="modal-detail-val" style="font-size:13px;color:var(--mid)">'+item.angle+'</div>';

  var existing = SCHEDULE[itemId] || {};
  document.getElementById('sched-film-date').value = existing.filmDate || '';
  document.getElementById('sched-edit-date').value = existing.editDate || '';
  document.getElementById('sched-pub-date').value = existing.pubDate || '';
  document.getElementById('sched-platform').value = existing.platform || item.platform || '';
  document.getElementById('sched-stage').value = existing.stage || item.stage || 'to_film';
  document.getElementById('sched-notes').value = existing.notes || '';
  document.getElementById('remove-btn').style.display = existing.filmDate ? 'block' : 'none';

  document.getElementById('schedule-modal').classList.add('open');
}

function openScheduleModalForDay(ds) {
  var highPri = BACKLOG.filter(function(i){ return i.priority==='high' && !SCHEDULE[i.id]; });
  if(highPri.length > 0) {
    openScheduleModal(highPri[0].id);
    document.getElementById('sched-film-date').value = ds;
  } else {
    var unscheduled = BACKLOG.filter(function(i){ return !SCHEDULE[i.id]; });
    if(unscheduled.length > 0) {
      openScheduleModal(unscheduled[0].id);
      document.getElementById('sched-film-date').value = ds;
    }
  }
}

function saveSchedule() {
  var filmDate = document.getElementById('sched-film-date').value;
  var editDate = document.getElementById('sched-edit-date').value;
  var pubDate = document.getElementById('sched-pub-date').value;
  var platform = document.getElementById('sched-platform').value;
  var stage = document.getElementById('sched-stage').value;
  var notes = document.getElementById('sched-notes').value;

  if(filmDate || editDate || pubDate) {
    SCHEDULE[schedulingItemId] = { filmDate:filmDate, editDate:editDate, pubDate:pubDate, platform:platform, stage:stage, notes:notes };
    var item = BACKLOG.find(function(i){ return i.id === schedulingItemId; });
    if(item) { item.stage = stage; if(platform) item.platform = platform; }
    if(stage === 'published') PUBLISHED.push(schedulingItemId);
  }

  closeModal();
  renderWeek();
  renderBacklog();
  updateStats();
  if(currentView==='day') renderDay();
  if(currentView==='month') renderMonth();
}

function removeFromSchedule() {
  delete SCHEDULE[schedulingItemId];
  closeModal();
  renderWeek();
  renderBacklog();
  updateStats();
}

function closeModal() {
  document.getElementById('schedule-modal').classList.remove('open');
  schedulingItemId = null;
}

// ── CHIP MODAL ──
function openChipModal(itemId) {
  var item = BACKLOG.find(function(i){ return i.id === itemId; });
  if(!item) return;
  var sched = SCHEDULE[itemId] || {};

  document.getElementById('chip-modal-title').textContent = item.name;
  var html = '';
  html += '<div class="modal-detail">';
  html += '<div class="modal-detail-label">Brand</div><div class="modal-detail-val">'+item.brand+'</div>';
  html += '<div class="modal-detail-label" style="margin-top:8px">Category / Source</div><div class="modal-detail-val">'+item.category+' • '+item.source+'</div>';
  if(item.products && item.products.length > 0) {
    html += '<div class="modal-detail-label" style="margin-top:8px">Products in this video</div>';
    html += '<div class="modal-detail-val" style="font-size:12px;">';
    item.products.forEach(function(p){ html += '• ' + p + '<br>'; });
    html += '</div>';
  }
  if(item.platform) html += '<div class="modal-detail-label" style="margin-top:8px">Platform</div><div class="modal-detail-val">'+item.platform+'</div>';
  if(item.deadline) html += '<div class="modal-detail-label" style="margin-top:8px">⚡ Deadline</div><div class="modal-detail-val" style="color:var(--gold)">'+item.deadline+'</div>';
  if(sched.filmDate) html += '<div class="modal-detail-label" style="margin-top:8px">🎬 Film</div><div class="modal-detail-val">'+sched.filmDate+'</div>';
  if(sched.editDate) html += '<div class="modal-detail-label" style="margin-top:8px">✂️ Edit</div><div class="modal-detail-val">'+sched.editDate+'</div>';
  if(sched.pubDate) html += '<div class="modal-detail-label" style="margin-top:8px">🚀 Publish</div><div class="modal-detail-val">'+sched.pubDate+'</div>';
  if(sched.notes) html += '<div class="modal-detail-label" style="margin-top:8px">Notes</div><div class="modal-detail-val" style="font-size:13px">'+sched.notes+'</div>';
  html += '</div>';
  document.getElementById('chip-modal-body').innerHTML = html;

  var btns = '<button class="btn-primary" onclick="document.getElementById(\'chip-modal\').classList.remove(\'open\');openScheduleModal(\''+itemId+'\')">Edit Schedule</button>';
  btns += '<button class="btn-secondary" onclick="document.getElementById(\'chip-modal\').classList.remove(\'open\')">Close</button>';
  document.getElementById('chip-modal-btns').innerHTML = btns;
  document.getElementById('chip-modal').classList.add('open');
}

// ── ADD ITEM MODAL ──
function openAddModal() {
  document.getElementById('add-modal').classList.add('open');
}
function closeAddModal() {
  document.getElementById('add-modal').classList.remove('open');
}
function saveNewItem() {
  var name = document.getElementById('add-name').value.trim();
  var brand = document.getElementById('add-brand').value.trim();
  if(!name || !brand) return;
  var newItem = {
    id: 'custom_'+Date.now(),
    name: name,
    brand: brand,
    category: document.getElementById('add-category').value,
    source: document.getElementById('add-source').value,
    platform: document.getElementById('add-platform').value,
    priority: document.getElementById('add-priority').value,
    deadline: document.getElementById('add-deadline').value,
    angle: document.getElementById('add-angle').value,
    cheers: document.getElementById('add-cheers').value,
    stage: 'to_film',
    status: 'Pending',
    celebrity: 'N',
    content: ''
  };
  BACKLOG.unshift(newItem);
  closeAddModal();
  renderBacklog();
  updateStats();
  if(currentView==='week') renderWeek();
}

// ── CLOSE MODALS ON OVERLAY CLICK ──
document.getElementById('schedule-modal').addEventListener('click', function(e){ if(e.target===this) closeModal(); });
document.getElementById('add-modal').addEventListener('click', function(e){ if(e.target===this) closeAddModal(); });
document.getElementById('chip-modal').addEventListener('click', function(e){ if(e.target===this) e.target.classList.remove('open'); });
document.getElementById('block-modal').addEventListener('click', function(e){ if(e.target===this) closeBlockModal(); });

// ── BLOCK DAY FUNCTIONS ──
function openBlockModal(ds) {
  blockingDate = ds;
  document.getElementById('block-date').value = ds;
  var existing = BLOCKED_DAYS[ds];
  document.getElementById('block-custom').value = existing || '';
  document.getElementById('unblock-btn').style.display = existing ? 'block' : 'none';
  selectedBlockType = '🏖️ Vacation';
  document.querySelectorAll('.block-type-btn').forEach(function(b){ b.classList.remove('active'); });
  document.querySelectorAll('.block-type-btn')[0].classList.add('active');
  document.getElementById('block-modal').classList.add('open');
}
function selectBlockType(btn) {
  selectedBlockType = btn.getAttribute('data-val');
  document.querySelectorAll('.block-type-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  document.getElementById('block-custom').value = '';
}
function saveBlockDay() {
  var custom = document.getElementById('block-custom').value.trim();
  BLOCKED_DAYS[blockingDate] = custom || selectedBlockType;
  closeBlockModal();
  if(currentView==='week') renderWeek();
  if(currentView==='day') renderDay();
  if(currentView==='month') renderMonth();
}
function unblockDay() {
  delete BLOCKED_DAYS[blockingDate];
  closeBlockModal();
  if(currentView==='week') renderWeek();
  if(currentView==='day') renderDay();
  if(currentView==='month') renderMonth();
}
function closeBlockModal() {
  document.getElementById('block-modal').classList.remove('open');
  blockingDate = null;
}

// Pre-populate scheduled items
SCHEDULE['nf_2'] = { filmDate:'2026-06-10', editDate:'2026-06-11', pubDate:'2026-06-13', platform:'(YTL)', stage:'to_film', notes:'Film Tuesday afternoon — cheers filming. Edit Wed/Thu. Publish Friday.' };
SCHEDULE['nf_1'] = { filmDate:'2026-06-10', editDate:'2026-06-16', pubDate:'2026-06-17', platform:'(YTS+IG)', stage:'to_film', notes:'Film Tuesday morning 11am — no cheers. Edit next week. Deadline June 22.' };

// Pre-populate published items
SCHEDULE['nf_9'] = { filmDate:'2026-05-29', editDate:'2026-05-29', pubDate:'2026-05-29', platform:'(YTS)', stage:'published', notes:'Published May 29 2026' };
PUBLISHED.push('nf_9');

// ── INIT ──
// Auto-detect mobile and default to day view
if(window.innerWidth < 600) {
  setView('day');
} else {
  updateStats();
  renderWeek();
  renderBacklog();
}
</script>
